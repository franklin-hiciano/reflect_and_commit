<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
    <title>Reflect &amp; Commit</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#0a0a0a" />
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
    <link rel="icon" href="icons/icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Reflect &amp; Commit" />
  </head>
  <body>
    <!-- AUTH -->
    <div class="auth-screen" id="authScreen">
      <div class="auth-box">
        <div class="auth-logo">Reflect <span class="amp">&amp;</span> Commit</div>
        <button class="btn-google" id="btnSignIn" onclick="doSignIn()">Continue with Google</button>
      </div>
    </div>

    <!-- HOME — opened from the app icon. settings / edit questions only. -->
    <div class="screen on" id="homeScreen">
      <button class="add-corner" onclick="addQuestion()" title="add a question">+</button>
      <div class="top-right-cluster">
        <input type="time" id="notifyTimeInput" onchange="onNotifyTimeChange(this.value)" />
        <button class="btn-test" onclick="sendSelfNotification()">test</button>
      </div>

      <div class="home-section grow" style="margin-top:52px">
        <div id="qList" class="q-list"></div>
      </div>

      <button class="btn-text signout-corner" onclick="doSignOut()">sign out</button>
    </div>

    <!-- LANDING — shown when NOT running as an installed PWA. Desktop: QR to
         install on your phone. Mobile: triggers the native install prompt. -->
    <div class="screen" id="landingScreen">
      <div class="landing-inner">
        <div class="auth-logo">Reflect <span class="amp">&amp;</span> Commit</div>
        <button class="btn-google" id="getStartedBtn" onclick="onGetStarted()">Get started</button>
        <div class="landing-qr-wrap" id="landingQrWrap" style="display:none">
          <img id="landingQrImg" class="landing-qr-img" alt="scan to install on your phone" />
          <div class="landing-qr-sub">scan with your phone to install — mobile only, no desktop app.</div>
        </div>
      </div>
    </div>

    <!-- NOT AVAILABLE -->
    <div class="screen" id="unavailableScreen">
      <div class="unavail-inner">
        <div class="unavail-label">not available right now</div>
        <div class="unavail-time">next reflection: <span id="nextAvailLabel"></span></div>
        <button class="btn-text" onclick="goHome()">go to settings</button>
      </div>
    </div>

    <!-- REFLECTION SCREEN — pill at the very top, nothing else -->
    <div class="screen" id="reflectScreen">
      <div class="reflect-black">
        <div class="pill-wrap">
          <div class="question-label" id="questionLabel"></div>
          <div class="pill">
            <input id="answerInput" class="pill-input" type="text" autocomplete="off"
              placeholder="type your answer…" oninput="onAnswerInput(this.value)"
              onkeydown="if(event.key==='Enter') nextCard()" />
            <button class="pill-recall" id="recallBtn" style="display:none">↺</button>
            <button class="pill-next" id="nextBtn" onclick="nextCard()">→</button>
          </div>
          <div class="recall-panel" id="recallPanel"></div>
        </div>

        <button class="reflect-exit" onclick="exitReflection()">✕</button>
      </div>
    </div>

    <script type="module" src="firebase-init.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
